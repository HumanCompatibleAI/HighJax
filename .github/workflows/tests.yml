name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.14']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: |
          pip install -e ".[trainer,tests]"

      - name: Run Python tests
        env:
          HIGHJAX_TESTS_LOOSE: '1'
        run: |
          pytest -n auto

  octane-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            octane/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('octane/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Python for test data
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          allow-prereleases: true

      - name: Install Python package (for test data generation)
        run: |
          pip install -e ".[trainer]"

      - name: Run Octane tests
        run: |
          cd octane
          cargo test --release -- --skip airbus
